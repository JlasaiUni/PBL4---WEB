# ============================================================
#  Docker Compose – PBL4 Plantilla Web
#  Servicios: app (Spring Boot 8080) + db (MySQL 8 3306)
# ============================================================

services:

  # ── Base de datos MySQL ───────────────────────────────────
  db:
    image: mysql:8.0
    container_name: pbl4_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pbl4_plantilla_web
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pbl4_net

  # ── Aplicación Spring Boot ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pbl4_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/pbl4_plantilla_web?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "8080:8080"
    networks:
      - pbl4_net

# ── Volúmenes ─────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Redes ────────────────────────────────────────────────
networks:
  pbl4_net:
    driver: bridge
