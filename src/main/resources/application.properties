# ============================================================
#  PBL4 PLANTILLA WEB  –  application.properties
# ============================================================

spring.application.name=PBL4PlantillaWeb

# ── Profiles ─────────────────────────────────────────────────
spring.profiles.active=dev

# ── Server ───────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ── DataSource (sobreescribir en application-dev/prod.properties)
spring.datasource.url=jdbc:mysql://localhost:3306/pbl4_plantilla_web?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ── Thymeleaf ────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.suffix=.html

# ── Security / JWT ───────────────────────────────────────────
# El secreto NUNCA debe ir en texto plano en este fichero.
# Define la variable de entorno JWT_SECRET antes de arrancar.
# En desarrollo el perfil dev lo sobreescribe con un valor fijo seguro.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── WebSocket ────────────────────────────────────────────────
app.websocket.allowed-origins=http://localhost:8080

# ── Cache ────────────────────────────────────────────────────
spring.cache.type=simple

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────

# ── Springdoc / Swagger UI ────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
# Excluir endpoints de actuator y MVC de la doc
springdoc.paths-to-exclude=/actuator/**,/auth/**,/dashboard,/admin,/posts/**,/search

