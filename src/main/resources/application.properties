# ============================================================
#  SPRING BOOT FULL-STACK TEMPLATE  –  application.properties
# ============================================================

spring.application.name=SpringBootTemplate

# ── Profiles ─────────────────────────────────────────────────
spring.profiles.active=dev

# ── Server ───────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ── DataSource (sobreescribir en application-dev/prod.properties)
spring.datasource.url=jdbc:mysql://localhost:3306/template_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ── Thymeleaf ────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.suffix=.html

# ── Security / JWT ───────────────────────────────────────────
app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast256BitsLong!1234567890
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── WebSocket ────────────────────────────────────────────────
app.websocket.allowed-origins=http://localhost:8080

# ── Cache ────────────────────────────────────────────────────
spring.cache.type=simple

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ──────────────────────────────────────────────────
logging.level.com.template=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG