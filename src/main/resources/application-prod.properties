# ============================================================
#  Perfil PROD — MySQL
# ============================================================

# ── DataSource ───────────────────────────────────────────────
# Todas estas variables son OBLIGATORIAS en producción (sin default intencionado).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────────────────────
# Variable OBLIGATORIA. La app no arrancará si no está definida.
# Genera un secreto seguro con: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET}

# ── Thymeleaf (cache ON en prod) ─────────────────────────────
spring.thymeleaf.cache=true

# ── Logging conservador ──────────────────────────────────────
logging.level.com.pbl4=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
