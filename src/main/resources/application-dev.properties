# ============================================================
#  Perfil DEV — H2 en memoria (para arrancar sin MySQL local)
# ============================================================

# ── DataSource: H2 en modo MySQL ─────────────────────────────
spring.datasource.url=jdbc:h2:mem:templatedb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate (validate, deja crear el esquema a Flyway)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# ── Flyway: H2 — usa la misma carpeta classpath:db/migration ─
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ── H2 Console (solo dev) ────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Cache simple en dev ──────────────────────────────────────
spring.cache.type=simple

# ── Thymeleaf sin cache para hot-reload ──────────────────────
spring.thymeleaf.cache=false
