<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuevo post')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 760px;">
        <div class="card shadow-sm fade-in-up">
            <div class="card-body p-4 p-md-5">
                <h3 class="mb-4">
                    <i class="bi bi-pencil-square me-2 text-primary-custom"></i>Nuevo post
                </h3>

                <form th:action="@{/posts}" th:object="${postRequest}" method="post">
                    <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" th:field="*{title}" class="form-control" required minlength="3" maxlength="200"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contenido</label>
                        <textarea th:field="*{content}" class="form-control" rows="10" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tags (separadas por coma)</label>
                        <input type="text" name="tags" class="form-control" placeholder="spring-boot, java, tutorial"/>
                    </div>

                    <div class="form-check mb-4">
                        <input type="checkbox" th:field="*{published}" class="form-check-input" id="pub"/>
                        <label class="form-check-label" for="pub">Publicar inmediatamente</label>
                    </div>

                    <button type="submit" class="btn btn-primary-custom">
                        <i class="bi bi-check2-circle me-1"></i>Guardar
                    </button>
                    <a th:href="@{/dashboard}" class="btn btn-link">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
