<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuevo post')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 760px;">
        <div class="card shadow-sm fade-in-up">
            <div class="card-body p-4 p-md-5">
                <h3 class="mb-4">
                    <i class="bi bi-pencil-square me-2 text-primary-custom"></i>Nuevo post
                </h3>

                <form th:action="@{/posts}" th:object="${postRequest}" method="post">
                    <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

                    <div class="mb-3">
                        <label class="form-label" for="title">Título</label>
                        <input type="text" th:field="*{title}" id="title"
                               class="form-control" required minlength="3" maxlength="200"
                               aria-required="true" aria-describedby="titleHelp"/>
                        <div id="titleHelp" class="form-text">Entre 3 y 200 caracteres.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="content">Contenido</label>
                        <textarea th:field="*{content}" id="content"
                                  class="form-control" rows="10" required
                                  aria-required="true"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="tags">Tags (separadas por coma)</label>
                        <input type="text" name="tags" id="tags"
                               class="form-control" placeholder="spring-boot, java, tutorial"
                               aria-describedby="tagsHelp"/>
                        <div id="tagsHelp" class="form-text">Opcional. Separa las etiquetas con coma.</div>
                    </div>

                    <div class="form-check mb-4">
                        <input type="checkbox" th:field="*{published}" class="form-check-input" id="pub"
                               aria-describedby="pubHelp"/>
                        <label class="form-check-label" for="pub">Publicar inmediatamente</label>
                        <div id="pubHelp" class="form-text">Sin marcar, el post se guarda como borrador.</div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom" id="btn-save"
                            aria-label="Guardar post">
                        <i class="bi bi-check2-circle me-1" aria-hidden="true"></i>Guardar
                    </button>
                    <a th:href="@{/dashboard}" class="btn btn-link"
                       aria-label="Cancelar y volver al dashboard">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
