<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${post?.title} ?: 'Post')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 800px;">
        <article th:if="${post != null}" class="card shadow-sm p-4 p-md-5 fade-in-up">
            <h1 class="display-6 mb-3" th:text="${post.title}">Título</h1>
            <p class="text-muted">
                <i class="bi bi-person"></i>
                <span th:text="${post.authorFullName} ?: ${post.authorUsername}">Autor</span>
                ·
                <i class="bi bi-clock"></i>
                <span th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">fecha</span>
            </p>
            <div class="mb-3">
                <span th:each="tag : ${post.tags}" class="badge bg-primary-custom me-1" th:text="${tag}">tag</span>
            </div>
            <hr/>
            <div class="post-content" th:utext="${post.content}">contenido</div>
        </article>

        <div th:if="${post == null}" class="alert alert-warning">
            Post no encontrado.
        </div>

        <a th:href="@{/}" class="btn btn-link mt-3">
            <i class="bi bi-arrow-left"></i> Volver al inicio
        </a>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
