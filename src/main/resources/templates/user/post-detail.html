<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${post?.title} ?: 'Post')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 800px;">
        <article th:if="${post != null}" class="card shadow-sm p-4 p-md-5 fade-in-up">
            <header>
                <h1 class="display-6 mb-3" th:text="${post.title}">Título</h1>
                <p class="text-muted">
                    <i class="bi bi-person" aria-hidden="true"></i>
                    <span th:text="${post.authorFullName} ?: ${post.authorUsername}">Autor</span>
                    ·
                    <i class="bi bi-clock" aria-hidden="true"></i>
                    <time th:datetime="${post.createdAt}"
                          th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">fecha</time>
                </p>
                <div class="mb-3" aria-label="Etiquetas del post">
                    <span th:each="tag : ${post.tags}"
                          class="badge bg-primary-custom me-1" th:text="${tag}">tag</span>
                </div>
            </header>
            <hr/>
            <div class="post-content" th:utext="${post.content}">contenido</div>

            <!-- Acciones del autor / admin -->
            <div class="mt-4 d-flex gap-2" sec:authorize="isAuthenticated()">
                <a th:href="@{'/posts/' + ${post.id} + '/edit'}"
                   class="btn btn-sm btn-outline-secondary"
                   aria-label="Editar este post">
                    <i class="bi bi-pencil me-1" aria-hidden="true"></i>Editar
                </a>
                <button type="button"
                        class="btn btn-sm btn-outline-danger"
                        th:data-confirm="'¿Eliminar el post «' + ${post.title} + '»? Esta acción no se puede deshacer.'"
                        th:data-confirm-action="'/api/v1/posts/' + ${post.id}"
                        data-confirm-method="DELETE"
                        data-confirm-redirect="/"
                        aria-label="Eliminar este post">
                    <i class="bi bi-trash me-1" aria-hidden="true"></i>Eliminar
                </button>
            </div>
        </article>

        <div th:if="${post == null}" class="alert alert-warning" role="alert">
            Post no encontrado.
        </div>

        <a th:href="@{/}" class="btn btn-link mt-3" aria-label="Volver al inicio">
            <i class="bi bi-arrow-left" aria-hidden="true"></i> Volver al inicio
        </a>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
