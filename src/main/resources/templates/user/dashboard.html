<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Mi Dashboard')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4 fade-in-up">
            <div>
                <h2 class="mb-1">
                    Hola, <span th:text="${user.fullName} ?: ${user.username}">Usuario</span>
                </h2>
                <p class="text-muted mb-0">Bienvenido a tu panel personal.</p>
            </div>
            <a th:href="@{/posts/new}" class="btn btn-primary-custom" aria-label="Crear nuevo post">
                <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>Nuevo post
            </a>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <i class="bi bi-file-earmark-post fs-1 text-primary-custom"></i>
                        <h3 class="mt-2 mb-0" th:text="${user.posts.size()}">0</h3>
                        <p class="text-muted mb-0">Mis posts</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <i class="bi bi-shield-check fs-1 text-success"></i>
                        <h3 class="mt-2 mb-0" th:text="${user.roles.size()}">0</h3>
                        <p class="text-muted mb-0">Roles asignados</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <i class="bi bi-bell fs-1 text-warning"></i>
                        <h3 class="mt-2 mb-0" id="notif-count">0</h3>
                        <p class="text-muted mb-0">Notificaciones</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notificaciones en vivo (WebSocket) -->
        <div class="card mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-broadcast me-2"></i>Notificaciones en tiempo real</h5>
            </div>
            <div class="card-body" id="live-notifications" style="max-height: 240px; overflow-y: auto;">
                <p class="text-muted small mb-0" id="ws-empty">Esperando notificaciones...</p>
            </div>
        </div>

        <!-- Mis posts -->
        <h4 class="mb-3">Mis posts recientes</h4>
        <div class="row g-3">
            <div th:each="post : ${user.posts}" class="col-md-6">
                <div class="card card-hover h-100" th:attr="data-post-id=${post.id}">
                    <div class="card-body">
                        <h6 class="card-title" th:text="${post.title}">Título</h6>
                        <p class="small text-muted mb-2">
                            <span th:if="${post.published}" class="badge bg-success">Publicado</span>
                            <span th:unless="${post.published}" class="badge bg-secondary">Borrador</span>
                            &middot;
                            <time th:datetime="${post.createdAt}"
                                  th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy')}">fecha</time>
                        </p>
                        <div class="d-flex gap-2 flex-wrap">
                            <a th:href="@{'/posts/' + ${post.id}}"
                               class="btn btn-sm btn-outline-primary"
                               th:attr="aria-label='Ver post: ' + ${post.title}">
                                <i class="bi bi-eye me-1" aria-hidden="true"></i>Ver
                            </a>
                            <a th:href="@{'/posts/' + ${post.id} + '/edit'}"
                               class="btn btn-sm btn-outline-secondary"
                               th:attr="aria-label='Editar post: ' + ${post.title}">
                                <i class="bi bi-pencil me-1" aria-hidden="true"></i>Editar
                            </a>
                            <button type="button"
                                    class="btn btn-sm btn-outline-danger"
                                    th:attr="data-confirm='¿Eliminar el post «' + ${post.title} + '»? Esta acción no se puede deshacer.',
                                             data-confirm-action='/api/v1/posts/' + ${post.id},
                                             aria-label='Eliminar post: ' + ${post.title}"
                                    data-confirm-method="DELETE"
                                    data-confirm-redirect="/dashboard">
                                <i class="bi bi-trash me-1" aria-hidden="true"></i>Eliminar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${user.posts.empty}" class="col-12">
                <div class="alert alert-info" role="alert">
                    Aún no tienes posts.
                    <a th:href="@{/posts/new}" class="alert-link">Crea tu primer post</a>.
                </div>
            </div>
        </div>

    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
