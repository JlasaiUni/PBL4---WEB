<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Inicio')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- ────────── HERO ────────── -->
<section class="hero-section text-white text-center d-flex align-items-center">
    <div class="container fade-in-up">
        <h1 class="display-3 fw-bold mb-3">Spring Boot Full-Stack Template</h1>
        <p class="lead mb-4">
            Spring Boot 3 + JPA + Security 6 + WebSocket + Thymeleaf + Bootstrap 5
        </p>
        <a th:href="@{/auth/register}" class="btn btn-light btn-lg me-2 px-4">
            <i class="bi bi-rocket-takeoff me-1"></i>Empezar
        </a>
        <a href="#posts" class="btn btn-outline-light btn-lg px-4">Ver posts</a>
    </div>
</section>

<!-- ────────── POSTS ────────── -->
<section id="posts" class="py-5">
    <div class="container">
        <h2 class="mb-4">Últimos posts</h2>

        <div th:if="${posts.empty}" class="alert alert-info">
            Aún no hay posts publicados.
            <a sec:authorize="isAuthenticated()" th:href="@{/posts/new}">Crear el primero</a>
        </div>

        <div class="row g-4">
            <div th:each="post : ${posts.content}" class="col-md-6 col-lg-4">
                <article class="card card-hover h-100 shadow-sm"
                         th:attr="aria-label='Post: ' + ${post.title}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${post.title}">Título</h5>
                        <p class="card-text text-muted small">
                            <i class="bi bi-person" aria-hidden="true"></i>
                            <span th:text="${post.authorFullName} ?: ${post.authorUsername}">Autor</span>
                            ·
                            <i class="bi bi-clock" aria-hidden="true"></i>
                            <time th:datetime="${post.createdAt}"
                                  th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy')}">fecha</time>
                        </p>
                        <p class="card-text"
                           th:text="${#strings.abbreviate(post.content, 120)}">Contenido...</p>
                        <div class="mb-3" aria-label="Etiquetas">
                            <span th:each="tag : ${post.tags}"
                                  class="badge bg-secondary me-1"
                                  th:text="${tag}">tag</span>
                        </div>
                        <a th:href="@{'/posts/' + ${post.id}}"
                           class="btn btn-primary-custom btn-sm"
                           th:attr="aria-label='Leer más sobre: ' + ${post.title}">
                            Leer más <i class="bi bi-arrow-right" aria-hidden="true"></i>
                        </a>
                    </div>
                </article>
            </div>
        </div>

        <!-- Paginación anterior/siguiente -->
        <nav th:if="${posts.totalPages > 1}" class="mt-4" aria-label="Navegación de páginas">
            <ul class="pagination justify-content-center align-items-center gap-2">
                <li class="page-item" th:classappend="${posts.first} ? 'disabled'">
