<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registro')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 520px;">
        <div class="card shadow-lg fade-in-up">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-person-plus-fill me-2 text-primary-custom"></i>Crear cuenta
                </h3>

                <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                <form th:action="@{/auth/register}"
                      th:object="${registerRequest}"
                      method="post" novalidate>
                    <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" th:field="*{fullName}" class="form-control"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{fullName}"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" th:field="*{username}" class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Contraseña</label>
                        <input type="password" th:field="*{password}" class="form-control"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                        <small class="form-text text-muted">Mínimo 6 caracteres.</small>
                    </div>

                    <button class="btn btn-primary-custom w-100" type="submit">
                        Crear cuenta <i class="bi bi-check2-circle ms-1"></i>
                    </button>
                </form>

                <p class="text-center mt-4 mb-0">
                    ¿Ya tienes cuenta?
                    <a th:href="@{/auth/login}" class="text-primary-custom fw-bold">Entra aquí</a>
                </p>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
