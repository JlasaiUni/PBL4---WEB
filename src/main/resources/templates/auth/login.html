<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Iniciar sesión')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 460px;">
        <div class="card shadow-lg fade-in-up">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-person-circle me-2 text-primary-custom"></i>Iniciar sesión
                </h3>

                <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
                <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>
                <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

                <form th:action="@{/auth/login}" method="post" class="needs-validation" novalidate>
                    <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

                    <div class="mb-3">
                        <label class="form-label">Usuario o email</label>
                        <input type="text" name="username" class="form-control" required autofocus/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required/>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" name="remember-me" id="remember"/>
                        <label class="form-check-label" for="remember">Recordarme</label>
                    </div>

                    <button class="btn btn-primary-custom w-100" type="submit">
                        Entrar <i class="bi bi-arrow-right ms-1"></i>
                    </button>
                </form>

                <p class="text-center mt-4 mb-0">
                    ¿Aún no tienes cuenta?
                    <a th:href="@{/auth/register}" class="text-primary-custom fw-bold">Regístrate</a>
                </p>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
