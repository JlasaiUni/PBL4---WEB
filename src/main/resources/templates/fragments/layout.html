<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>

    <title th:text="${title} ?: 'Spring Boot Template'">Spring Boot Template</title>

    <!-- Bootstrap 5 compilado con variables SASS personalizadas -->
    <link rel="stylesheet" th:href="@{/css/bootstrap-custom.css}"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Tema personalizado (variables CSS runtime + utilidades) -->
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
</head>
<body>

<!-- ────────── NAVBAR ────────── -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary-custom shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-rocket-takeoff-fill me-2"></i>Template
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav" aria-expanded="false" aria-label="Abrir menú de navegación">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/chat}">
                        <i class="bi bi-chat-dots me-1" aria-hidden="true"></i>Chat
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
            </ul>

            <form class="d-flex me-3" th:action="@{/search}" method="get" role="search">
                <input class="form-control form-control-sm me-1" type="search" name="q"
                       placeholder="Buscar..." aria-label="Buscar posts"/>
                <button class="btn btn-outline-light btn-sm" type="submit" aria-label="Enviar búsqueda">
                    <i class="bi bi-search"></i>
                </button>
            </form>

            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}">Entrar</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link btn btn-outline-light btn-sm ms-2 px-3" th:href="@{/auth/register}">Registro</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false"
                       aria-label="Menú de usuario">
                        <i class="bi bi-person-circle me-1" aria-hidden="true"></i>
                        <span sec:authentication="name">user</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/dashboard}">Mi panel</a></li>
                        <li><a class="dropdown-item" th:href="@{/posts/new}">Nuevo post</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                                <button class="dropdown-item" type="submit">
                                    <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ────────── FOOTER ────────── -->
<footer th:fragment="footer" class="footer-custom mt-5 py-4">
    <div class="container text-center">
        <p class="mb-1">&copy; 2026 Spring Boot Full-Stack Template</p>
        <p class="small text-muted mb-0">
            Spring Boot 3 · Thymeleaf · Bootstrap 5 · WebSockets · JWT
        </p>
    </div>
</footer>

<!-- ────────── SCRIPTS ────────── -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
</th:block>

</body>
</html>
