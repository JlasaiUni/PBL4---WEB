<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Panel admin')}"></head>
<body class="bg-light-custom">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container">
        <h2 class="mb-4">
            <i class="bi bi-shield-lock-fill me-2 text-danger"></i>Panel de administración
        </h2>

        <div class="card shadow-sm fade-in-up">
            <div class="card-header bg-white">
                <h5 class="mb-0">Usuarios registrados</h5>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Nombre</th>
                        <th>Roles</th>
                        <th>Estado</th>
                        <th>Creado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}">admin</td>
                        <td th:text="${u.email}">a@b.c</td>
                        <td th:text="${u.fullName}">Nombre</td>
                        <td>
                            <span th:each="r : ${u.roles}"
                                  class="badge bg-secondary me-1"
                                  th:text="${r.name}">ROLE</span>
                        </td>
                        <td>
                            <span th:if="${u.enabled}" class="badge bg-success">Activo</span>
                            <span th:unless="${u.enabled}" class="badge bg-danger">Inactivo</span>
                        </td>
                        <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">fecha</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
